# Template: Node/TypeScript unit tests + build.
# Customise: Node version, package manager, and the test/build commands to match the project's package.json.
# Verify action versions with find-docs/ctx7 before committing.
name: Unit

on:
  push:
  pull_request:
    branches: [main]

jobs:
  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20          # set to the project's supported version
          cache: npm                # change to pnpm/yarn if used

      - name: Install dependencies
        run: npm ci

      # Run the project's unit suite. Use the script the project actually defines.
      - name: Run unit tests
        run: npm test

      # Optional: prove it still builds. Drop if there is no build step.
      - name: Build
        run: npm run build --if-present
