# CI for the cli-calculator smoke-test app (Node + Vitest).
# The project is self-contained under sandbox/cli-calculator/, so every step
# runs from that working directory.
name: cli-calculator

on:
  push:
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: sandbox/cli-calculator

jobs:
  unit:
    name: unit + integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sandbox/cli-calculator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests (unit + CLI integration)
        run: npm test
